<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fresas con Crema</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ESTILOS -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">

    .info {
      flex: 1;
      min-width: 250px;
    }

    h1 {
      color: #e63946;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #e63946;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #d62828;
    }

    #resultado {
      margin-top: 15px;
      font-weight: bold;
    }

    .barcode-section {
      margin-top: 30px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- IMAGEN -->
  <div class="imagen">
    <img src="https://i.imgur.com/3ZQ3Z4C.jpg" alt="Fresas con crema">
  </div>

  <!-- INFORMACIÓN -->
  <div class="info">
    <h1>🍓 Fresas con Crema</h1>

    <p>
      Delicioso postre preparado con fresas frescas y crema dulce.
      Perfecto para cualquier momento del día.
    </p>

    <h3>Precio</h3>
    <p><strong>$0.50 por unidad</strong></p>

    <h3>Realizar pedido</h3>

    <input type="text" id="nombre" placeholder="Ingresa tu nombre">
    <input type="number" id="cantidad" placeholder="Cantidad de unidades">

    <button onclick="calcular()">Calcular pedido</button>

    <p id="resultado"></p>

    <!-- CÓDIGO DE BARRAS -->
    <div class="barcode-section">
      <h3>Código de barras</h3>
      <svg id="barcode"></svg>
      <p id="numero-barra"></p>
    </div>

  </div>

</div>

<!-- SCRIPT -->
<script>
  function calcular() {
    const nombre = document.getElementById("nombre").value;
    const cantidad = parseInt(document.getElementById("cantidad").value);
    const precio = 0.50;
    const resultado = document.getElementById("resultado");

    if(nombre && cantidad > 0){
      const total = (cantidad * precio).toFixed(2);
      resultado.innerHTML = `Gracias ${nombre}, pediste ${cantidad} unidades 🍓<br>Total a pagar: $${total}`;
    } else {
      resultado.innerHTML = "Por favor completa los datos correctamente";
    }
  }

  // Cargar librería de código de barras
  const script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js";

  script.onload = function() {
    const codigo = "750123456789"; // número del código
    JsBarcode("#barcode", codigo, {
      format: "EAN13",
      displayValue: false
    });

    document.getElementById("numero-barra").innerText = codigo;
  };

  document.body.appendChild(script);
</script>

</body>
      </html>
