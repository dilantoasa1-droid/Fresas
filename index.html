<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresas con Crema</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      padding: 20px;
      margin: 0;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      background: white;
      border-radius: 15px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      gap: 20px;
    }

    .imagen {
      flex: 1;
      min-width: 250px;
    }

    .imagen img {
      width: 100%;
      border-radius: 15px;
    }

    .info {
      flex: 1;
      min-width: 250px;
    }

    h1 {
      color: #e63946;
    }

    button {
      background: #e63946;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="imagen">
    <img src="https://i.imgur.com/3ZQ3Z4C.jpg">
  </div>

  <div class="info">
    <h1>🍓 Fresas con Crema</h1>

    <p>Delicioso postre de fresas con crema.</p>

    <input type="text" id="nombre" placeholder="Tu nombre">
    <input type="number" id="cantidad" placeholder="Cantidad">
    <button onclick="hacerPedido()">Pedir</button>

    <p id="mensaje"></p>
  </div>

</div>

<script>
function hacerPedido() {
  const nombre = document.getElementById('nombre').value;
  const cantidad = document.getElementById('cantidad').value;
  const mensaje = document.getElementById('mensaje');

  if(nombre && cantidad){
    mensaje.innerHTML = "Pedido realizado correctamente 🍓";
  } else {
    mensaje.innerHTML = "Completa los datos";
  }
}
</script>

</body>
</html>
